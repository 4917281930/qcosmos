syntax = "proto3";

package qcosmos.pqibc.v1;

option go_package = "github.com/qcosmos/protocol/x/pqibc/types";

message TrustedConsensusState {
  uint64 timestamp_unix_ms = 1;
  bytes app_hash = 2;
  bytes next_validators_hash = 3;
}

message HybridClientUpdate {
  TrustedConsensusState trusted_consensus_state = 1;
  bytes cometbft_header = 2;
  bytes validator_set = 3;
  bytes trusted_validator_set = 4;
  bytes pq_finality_certificate = 5;
}

message HybridClientUpdateResult {
  bool ok = 1;
  repeated string errors = 2;
}
